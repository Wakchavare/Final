services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-casting_production}
      POSTGRES_USER: ${POSTGRES_USER:-casting_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casting_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casting_user} -d ${POSTGRES_DB:-casting_production}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://casting_user:casting_password@postgres:5432/casting_production}
      JWT_SECRET: ${JWT_SECRET:-temp-change-later-unique-designs-casting-2026-05-24-9b7d4c2f6a8e5d1c}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://uniquedesignscasting.com,https://uniquedesignscasting.com,http://www.uniquedesignscasting.com,https://www.uniquedesignscasting.com}
      INVOICE_FILE_ROOT: /app/generated/invoicing
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - invoice_files:/app/generated
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  invoice_files:
